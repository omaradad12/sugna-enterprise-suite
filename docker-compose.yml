# Sugna Enterprise Suite - Django + PostgreSQL
# Usage: see DEPLOY.md
#
# Development: docker compose --env-file .env.dev -f docker-compose.yml -f docker-compose.dev.yml up -d
# Production:  docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d
# Or copy .env.dev or .env.prod to .env and run: docker compose up -d

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-sugna_enterprise_suite}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sugna_enterprise_suite}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 --threads 2 sugna_core.wsgi:application
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
  static_volume:
  media_volume:
