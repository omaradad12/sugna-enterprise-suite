# Sugna Enterprise Suite - Django + PostgreSQL
#
# This file is environment-agnostic.
# Use:
#   Development:
#     docker compose --env-file .env.dev -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#   Production:
#     docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sugna_enterprise_suite}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in --env-file (.env.dev / .env.prod)}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sugna_enterprise_suite}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    command: gunicorn -c config/gunicorn/gunicorn_conf.py sugna_core.wsgi:application
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

