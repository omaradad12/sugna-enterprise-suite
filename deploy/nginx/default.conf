server {
    listen 80;
    server_name app.sugnaerp.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.sugnaerp.com;

    ssl_certificate /etc/letsencrypt/live/app.sugnaerp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sugnaerp.com/privkey.pem;

    client_max_body_size 50M;

    # Shared Docker volume: populated by `collectstatic` in the web container (see deploy/docker-entrypoint.sh).
    # URI /static/... → filesystem /staticfiles/...
    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
