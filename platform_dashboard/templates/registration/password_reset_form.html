{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Sugna Enterprise Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-xl p-7">
      <div class="flex items-center gap-3 mb-6">
        <img src="{% url 'platform_dashboard:logo' %}" alt="Sugna Platform" class="h-11 w-auto object-contain" />
        <div>
          <h1 class="text-lg font-semibold">Reset Password</h1>
          <p class="text-xs text-slate-500">Platform and tenant account recovery</p>
        </div>
      </div>
      <p class="text-sm text-slate-600 mb-4">
        Enter your account email address. We will send a secure password reset link.
      </p>
      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Email</label>
          <input type="email" name="email" required class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/30 focus:border-sky-500">
        </div>
        <button type="submit" class="w-full rounded-lg bg-sky-600 hover:bg-sky-700 text-white text-sm font-semibold py-2.5">
          Send reset link
        </button>
      </form>
      <p class="text-xs text-slate-500 mt-5">
        <a href="{% url 'platform_login' %}" class="underline">Back to platform sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
