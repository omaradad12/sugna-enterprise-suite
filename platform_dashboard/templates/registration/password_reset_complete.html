<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Updated | Sugna Enterprise Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-xl p-7">
      <h1 class="text-lg font-semibold">Password updated</h1>
      <p class="text-sm text-slate-600 mt-3">
        Your password was changed successfully. You can now sign in.
      </p>
      <a href="{% url 'platform_login' %}" class="mt-6 inline-flex w-full justify-center rounded-lg bg-sky-600 hover:bg-sky-700 text-white text-sm font-semibold py-2.5">
        Go to sign in
      </a>
    </div>
  </div>
</body>
</html>
