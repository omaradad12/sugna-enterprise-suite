<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password | Sugna Enterprise Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-xl p-7">
      <h1 class="text-lg font-semibold">Set a new password</h1>
      {% if validlink %}
        <form method="post" class="space-y-4 mt-5">
          {% csrf_token %}
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">New password</label>
            <input type="password" name="new_password1" required class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/30 focus:border-sky-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">Confirm new password</label>
            <input type="password" name="new_password2" required class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/30 focus:border-sky-500">
          </div>
          <button type="submit" class="w-full rounded-lg bg-sky-600 hover:bg-sky-700 text-white text-sm font-semibold py-2.5">
            Update password
          </button>
        </form>
      {% else %}
        <p class="text-sm text-red-700 mt-4">
          This reset link is invalid or expired. Request a new one.
        </p>
      {% endif %}
    </div>
  </div>
</body>
</html>
