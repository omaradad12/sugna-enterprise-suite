{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Sugna Enterprise Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 flex items-center justify-center px-4 py-10">
      <div class="w-full max-w-md">
        <div class="bg-white/95 border border-slate-200 rounded-2xl shadow-xl overflow-hidden">
          <div class="px-7 py-6 bg-gradient-to-br from-sky-700 via-blue-600 to-blue-700 text-white">
            <div class="flex items-center gap-3">
              <div class="w-11 h-11 rounded-2xl bg-white/15 backdrop-blur flex items-center justify-center overflow-hidden" aria-hidden="true">
                <img src="{% url 'platform_dashboard:logo' %}" alt="Sugna" class="w-8 h-8 object-contain" />
              </div>
              <div>
                <div class="text-xl font-semibold leading-tight">Forgot password?</div>
                <div class="text-xs text-white/90 font-medium">Secure Platform Access</div>
              </div>
            </div>
          </div>

          <div class="p-7">
            <div class="text-sm text-slate-600 mb-5">
              Enter your account email address. We will send you a secure password reset link.
            </div>

            <form method="post" class="space-y-4">
              {% csrf_token %}

              {% if form.errors %}
                <div class="rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" role="alert">
                  Please enter a valid email address.
                </div>
              {% endif %}

              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1" for="id_email">Email</label>
                <input
                  id="id_email"
                  type="email"
                  name="{{ form.email.html_name }}"
                  value="{{ form.email.value|default_if_none:'' }}"
                  autocomplete="email"
                  required
                  class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm shadow-sm focus:border-sky-500 focus:ring-4 focus:ring-sky-200/50 outline-none"
                >
              </div>

              <button
                type="submit"
                class="w-full inline-flex items-center justify-center rounded-xl bg-gradient-to-r from-sky-600 to-blue-700 px-4 py-2.5 text-white font-semibold shadow-sm hover:brightness-105 focus:ring-4 focus:ring-sky-200/50 transition"
              >
                Send reset link
              </button>
            </form>

            <div class="mt-6 text-center">
              <a href="{% url 'platform_login' %}" class="text-sm font-medium text-sky-700 hover:underline">
                Back to Platform Sign In
              </a>
            </div>
          </div>
        </div>
      </div>
  </body>
</html>
