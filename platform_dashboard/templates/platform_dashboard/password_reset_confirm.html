{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Sugna Enterprise Suite</title>
    <link rel="stylesheet" href="{% static 'css/platform_login.css' %}">
  </head>
  <body>
    <div class="ps-login-page">
      <div class="ps-login-right">
        <div class="ps-login-card" style="max-width: 520px;">
          <div class="ps-login-card-header">
            <div class="ps-login-card-mark" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 28 28" fill="none">
                <rect x="3.5" y="3.5" width="10" height="10" rx="2.2" fill="rgba(0,120,212,0.95)"/>
                <rect x="14.5" y="3.5" width="10" height="10" rx="2.2" fill="rgba(16,110,190,0.95)"/>
                <rect x="3.5" y="14.5" width="10" height="10" rx="2.2" fill="rgba(16,110,190,0.95)"/>
                <rect x="14.5" y="14.5" width="10" height="10" rx="2.2" fill="rgba(0,120,212,0.95)"/>
              </svg>
            </div>
            <div>
              <div class="ps-login-card-title">Set a new password</div>
              <div class="ps-login-card-subtitle">Secure Platform Access</div>
            </div>
          </div>

          {% if validlink %}
            <form method="post" class="ps-login-form" style="margin-top: 14px;">
              {% csrf_token %}

              <label class="ps-login-label" for="id_new_password1">New password</label>
              <input
                id="id_new_password1"
                type="password"
                name="{{ form.new_password1.html_name }}"
                autocomplete="new-password"
                required
                class="ps-login-input"
              >

              <label class="ps-login-label" for="id_new_password2">Confirm new password</label>
              <input
                id="id_new_password2"
                type="password"
                name="{{ form.new_password2.html_name }}"
                autocomplete="new-password"
                required
                class="ps-login-input"
              >

              <button type="submit" class="ps-login-button">Update password</button>
            </form>
          {% else %}
            <div class="ps-login-alert" role="alert" style="margin-top: 14px;">
              This reset link is invalid or expired. Please request a new one.
            </div>
          {% endif %}

          <div style="margin-top: 14px;">
            <a class="ps-login-link" href="{% url 'platform_login' %}">Back to Platform Sign In</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
