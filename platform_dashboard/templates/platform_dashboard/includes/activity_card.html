{# ActivityCard — title, icon (feather), tone (primary|amber|emerald|slate), view_all_url, view_all_label, body_partial #}
<div class="platform-card platform-card--interactive platform-card--pad">
  <div class="mb-5 flex items-center justify-between gap-2">
    <h2 class="platform-section-title flex min-w-0 items-center gap-2.5">
      <span class="platform-activity-card__icon platform-activity-card__icon--{{ tone }}"><i data-feather="{{ icon }}" class="h-4 w-4"></i></span>
      <span class="truncate">{{ title }}</span>
    </h2>
    <a href="{{ view_all_url }}" class="flex-shrink-0 text-xs font-medium text-primary-600 hover:text-primary-700">{{ view_all_label }}</a>
  </div>
  {% include body_partial %}
</div>
