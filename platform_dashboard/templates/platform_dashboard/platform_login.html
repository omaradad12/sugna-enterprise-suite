{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Sugna Platform Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/platform_login.css' %}">
  </head>
  <body>
    <div class="ps-login-page">
      <main class="ps-login-right">
        <div class="ps-login-card" role="region" aria-label="Platform sign in" style="max-width: 520px;">
            <div class="ps-login-card-header">
              <div class="ps-login-card-mark" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 28 28" fill="none">
                  <rect x="3.5" y="3.5" width="10" height="10" rx="2.2" fill="rgba(0,120,212,0.95)"/>
                  <rect x="14.5" y="3.5" width="10" height="10" rx="2.2" fill="rgba(16,110,190,0.95)"/>
                  <rect x="3.5" y="14.5" width="10" height="10" rx="2.2" fill="rgba(16,110,190,0.95)"/>
                  <rect x="14.5" y="14.5" width="10" height="10" rx="2.2" fill="rgba(0,120,212,0.95)"/>
                </svg>
              </div>
              <div>
                <div class="ps-login-card-title">Platform Sign In</div>
                <div class="ps-login-card-subtitle">Use your platform credentials</div>
              </div>
            </div>

            {% if form.errors %}
              <div class="ps-login-alert" role="alert">
                Invalid username or password.
              </div>
            {% endif %}

            <form method="post" action="" class="ps-login-form">
              {% csrf_token %}

              <label class="ps-login-label" for="id_username">Username</label>
              <input
                id="id_username"
                type="text"
                name="{{ form.username.html_name }}"
                value="{{ form.username.value|default_if_none:'' }}"
                autocomplete="username"
                required
                class="ps-login-input"
              >

              <label class="ps-login-label" for="id_password">Password</label>
              <input
                id="id_password"
                type="password"
                name="{{ form.password.html_name }}"
                autocomplete="current-password"
                required
                class="ps-login-input"
              >

              <div class="ps-login-forgot">
                <a href="/platform/password-reset/">Forgot password?</a>
              </div>

              <button type="submit" class="ps-login-button">Sign in</button>
            </form>

            <div class="ps-login-footnote">
              Sugna Enterprise Suite • Tenant data remains isolated per workspace database.
            </div>
          </div>
      </main>
    </div>
  </body>
</html>
