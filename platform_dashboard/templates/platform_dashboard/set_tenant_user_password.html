{% extends "platform_dashboard/base.html" %}
{% block title %}Set Password{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto animate-fade-in">
  <div class="mb-6">
    <a href="{% url 'platform_dashboard:tenant_detail' tenant.id %}#tenant-users" class="inline-flex items-center gap-2 text-slate-600 hover:text-primary-600 text-sm font-medium mb-4">
      <i data-feather="arrow-left" class="w-4 h-4"></i> Back to tenant
    </a>
    <h1 class="text-2xl font-bold text-slate-900">Set new password</h1>
    <p class="text-slate-500 text-sm mt-1">
      Tenant: <span class="font-medium text-slate-700">{{ tenant.name }}</span> · User: <span class="font-mono text-slate-700">{{ email }}</span>
    </p>
  </div>

  <div class="dynamics-card overflow-hidden">
    <div class="px-5 py-4 border-b border-slate-200 text-sm font-semibold text-slate-800">New password</div>
    <form method="post" class="px-5 py-5 space-y-4">
      {% csrf_token %}
      <input type="hidden" name="tenant_id" value="{{ tenant.id }}">
      <input type="hidden" name="email" value="{{ email }}">
      <input type="hidden" name="next" value="{{ next }}">

      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">Password</label>
        <input type="password" name="new_password" minlength="8" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500">
        <p class="text-xs text-slate-500 mt-1">Minimum 8 characters.</p>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">Confirm password</label>
        <input type="password" name="confirm_password" minlength="8" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500">
      </div>

      <div class="flex items-center justify-between gap-3 pt-2">
        <a href="{% url 'platform_dashboard:tenant_detail' tenant.id %}#tenant-users" class="px-4 py-2 rounded-lg border border-slate-200 text-slate-700 text-sm font-medium hover:bg-slate-50">Cancel</a>
        <button class="px-5 py-2 rounded-lg bg-primary-600 text-white text-sm font-semibold hover:bg-primary-700">Save password</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
