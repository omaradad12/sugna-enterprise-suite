{% extends "platform_dashboard/base.html" %}
{% block title %}No tenants for module{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto animate-fade-in dynamics-card p-8 text-center">
  <div class="w-14 h-14 rounded-2xl bg-slate-100 flex items-center justify-center mx-auto mb-4">
    <i data-feather="users" class="w-7 h-7 text-slate-500"></i>
  </div>
  <h1 class="text-xl font-bold text-slate-900 mb-2">No tenants subscribed</h1>
  <p class="text-slate-600 text-sm mb-6">
    No tenants are subscribed to <span class="font-semibold">{{ module.name }}</span>
    (<span class="font-mono text-xs">{{ module.code }}</span>) yet.
  </p>
  <a href="{% url 'platform_dashboard:module_list' %}" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-white text-sm font-semibold" style="background:#0078D4;">
    Back to modules
  </a>
</div>
{% endblock %}
