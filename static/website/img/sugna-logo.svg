<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 44" fill="none" role="img" aria-labelledby="sugna-logo-title">
  <title id="sugna-logo-title">Sugna Enterprise Suite</title>
  <defs>
    <linearGradient id="sugnaMarkGrad" x1="6" y1="4" x2="38" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2b6cb0"/>
      <stop offset="0.55" stop-color="#1e5a96"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="sugnaMarkShine" x1="10" y1="8" x2="34" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="sugnaMarkShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-opacity="0.14"/>
    </filter>
    <clipPath id="sugnaIconClip">
      <rect x="2" y="2" width="40" height="40" rx="10"/>
    </clipPath>
  </defs>
  <g filter="url(#sugnaMarkShadow)">
    <rect x="2" y="2" width="40" height="40" rx="10" fill="url(#sugnaMarkGrad)"/>
    <rect x="2" y="2" width="40" height="40" rx="10" fill="url(#sugnaMarkShine)"/>
  </g>
  <g clip-path="url(#sugnaIconClip)">
    <rect x="8" y="11" width="24" height="4.5" rx="2.25" fill="#ffffff" fill-opacity="0.95"/>
    <rect x="8" y="18.25" width="16" height="4.5" rx="2.25" fill="#ffffff" fill-opacity="0.88"/>
    <rect x="8" y="25.5" width="20" height="4.5" rx="2.25" fill="#ffffff" fill-opacity="0.88"/>
    <rect x="8" y="32.75" width="14" height="4.5" rx="2.25" fill="#ffffff" fill-opacity="0.82"/>
  </g>
  <text x="52" y="27" fill="#1a1a1a" font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.03em">Sugna</text>
  <text x="52" y="39" fill="#64748b" font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.5" font-weight="600" letter-spacing="0.12em">ENTERPRISE SUITE</text>
</svg>
