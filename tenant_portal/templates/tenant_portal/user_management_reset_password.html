{% extends "tenant_portal/_layout_fullwidth.html" %}
{% block title %}{{ tenant_display_name|default:tenant.name }} | Reset password: {{ target_user.email }}{% endblock %}
{% block content %}
<style>
  .user-mgmt-page { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  .user-mgmt-hero { background: linear-gradient(135deg, #0078d4 0%, #106ebe 50%, #005a9e 100%); }
</style>
<div class="user-mgmt-page max-w-xl mx-auto pb-10">
  <div class="user-mgmt-hero rounded-lg overflow-hidden mb-5 text-white">
    <div class="px-4 py-3 flex items-center gap-3">
      <div class="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center text-white" style="background: rgba(255,255,255,0.22);">
        <i data-feather="lock" class="w-5 h-5"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight">Reset password</h1>
        <p class="text-xs opacity-90">{{ target_user.email }}</p>
      </div>
    </div>
  </div>

  <div class="rounded-xl border bg-white overflow-hidden p-6" style="border-color: #e5e7eb; box-shadow: 0 1px 4px rgba(0,0,0,0.05);">
    <form method="post" action="{% url 'tenant_portal:user_management_reset_password' target_user.pk %}">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-wider mb-1" style="color: #605e5c;">New password (min 8 characters)</label>
          <input type="password" name="new_password" minlength="8" autocomplete="new-password" class="w-full px-3 py-2 rounded border text-sm" style="border-color: #d1d5db;" required />
        </div>
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-wider mb-1" style="color: #605e5c;">Confirm new password</label>
          <input type="password" name="confirm_password" autocomplete="new-password" class="w-full px-3 py-2 rounded border text-sm" style="border-color: #d1d5db;" required />
        </div>
      </div>
      <div class="mt-5 flex items-center gap-3">
        <button type="submit" class="px-4 py-2 rounded text-sm font-medium text-white" style="background: #0078d4;">Reset password</button>
        <a href="{% url 'tenant_portal:user_management_view' target_user.pk %}" class="px-4 py-2 rounded text-sm font-medium border" style="border-color: #d1d5db; color: #374151;">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
