version: "3.9"

services:
  db:
    restart: unless-stopped
    environment:
      POSTGRES_DB: sugna_enterprise_suite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sugna_enterprise_suite"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    restart: unless-stopped
    build:
      context: /root/sugna-enterprise-suite
    restart: unless-stopped
    command: gunicorn -c config/gunicorn/gunicorn_conf.py sugna_core.wsgi:application
    depends_on:
      db:
        condition: service_healthy
    environment:
      ALLOWED_HOSTS: 127.0.0.1,localhost,46.224.112.206,sugnaerp.com,www.sugnaerp.com,app.sugnaerp.com,.sugnaerp.com
      DB_EXTRA_TENANTS: "false"
      DB_HOST: db
      DB_NAME: sugna_enterprise_suite
      DB_PASSWORD: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DEBUG: "False"
      DJANGO_SECRET_KEY: sugna-super-secret-2026
      DJANGO_SETTINGS_MODULE: config.settings.prod
      # Contact / demo form mail — set via `.env.prod` (do not commit passwords). See `.env.example`.
      WEBSITE_INBOUND_EMAIL: ${WEBSITE_INBOUND_EMAIL:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
    expose:
      - "8000"
    volumes:
      - media_volume_prod:/app/media:rw
      # Same volume as nginx:/staticfiles — entrypoint runs collectstatic into /app/staticfiles (see deploy/docker-entrypoint.sh).
      - static_volume_prod:/app/staticfiles:rw

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /root/sugna-enterprise-suite/deploy/nginx:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - media_volume_prod:/media:ro
      # location /static/ → alias /staticfiles/ (must match web STATIC_ROOT volume content)
      - static_volume_prod:/staticfiles:ro
    restart: unless-stopped

volumes:
  pgdata_prod: {}
  media_volume_prod: {}
  static_volume_prod: {}
