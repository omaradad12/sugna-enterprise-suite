version: "3.9"

services:
  db:
    environment:
      POSTGRES_DB: sugna_enterprise_suite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  web:
    build:
      context: /root/sugna-enterprise-suite
    command: gunicorn -c config/gunicorn/gunicorn_conf.py sugna_core.wsgi:application
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DEBUG: "False"
      DJANGO_SECRET_KEY: sugna-super-secret-2026
      ALLOWED_HOSTS: 127.0.0.1,localhost,46.224.112.206,app.sugnaerp.com
      DB_NAME: sugna_enterprise_suite
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
      DB_EXTRA_TENANTS: "false"
    expose:
      - "8000"
    volumes:
      - media_volume_prod:/app/media:rw
      - static_volume_prod:/app/staticfiles:rw

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - media_volume_prod:/media:ro
      - static_volume_prod:/staticfiles:ro
    restart: unless-stopped

volumes:
  pgdata_prod: {}
  media_volume_prod: {}
  static_volume_prod: {}
