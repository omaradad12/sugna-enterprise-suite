{% load static %}
<header class="site-header">
  <div class="site-header-shell">
    <div class="container header-inner">
      <div class="header-brand-row">
        <a class="logo logo--asset" href="{% url 'website:home' %}" aria-label="Sugna Enterprise Suite">
          <img class="logo-mark" src="{% static 'assets/images/logo.png' %}" width="260" height="72" alt="Sugna Enterprise Suite" />
        </a>
        <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="nav-main" aria-label="Open menu" id="nav-toggle">
          <span></span><span></span><span></span>
        </button>
      </div>
      <nav class="nav-main" id="nav-main" aria-label="Primary">
        <a href="{% url 'website:home' %}">Home</a>
        <a href="{% url 'website:about' %}">About</a>
        <a href="{% url 'website:modules' %}">Modules</a>
        <a href="{% url 'website:solutions' %}">Solutions</a>
        <a href="{% url 'website:features' %}">Features</a>
        <a href="{% url 'website:industries' %}">Industries</a>
        <a href="{% url 'website:pricing' %}">Pricing</a>
        <a href="{% url 'website:training' %}">Training</a>
        <a href="{% url 'website:blog' %}">Blog</a>
        <a href="{% url 'website:demo_request' %}">Demo</a>
        <a href="{% url 'website:support' %}">Support</a>
      </nav>
      <div class="header-end">
        <div class="header-actions">
          <a class="header-signin" href="{% url 'website:login_portal' %}">Sign in</a>
          <a class="btn btn-header-cta" href="{% url 'website:demo_request' %}">Request demo</a>
        </div>
      </div>
    </div>
  </div>
</header>
<script>
(function () {
  var btn = document.getElementById("nav-toggle");
  var nav = document.getElementById("nav-main");
  if (btn && nav) {
    btn.addEventListener("click", function () {
      var open = nav.classList.toggle("is-open");
      btn.setAttribute("aria-expanded", open ? "true" : "false");
    });
  }
})();
</script>
