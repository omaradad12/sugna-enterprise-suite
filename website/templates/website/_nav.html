{% load static %}
<header class="site-header" id="site-header">
  <div class="site-header-accent" aria-hidden="true"></div>
  <div class="site-header-shell navbar">
    <div class="container header-inner">
      <div class="header-brand">
        <a class="logo logo--asset" href="{% url 'website:home' %}" aria-label="Sugna Enterprise Suite — Home">
          <img
            class="logo-mark"
            src="{% static 'assets/images/logo.png' %}"
            width="300"
            height="84"
            alt="Sugna Enterprise Suite"
            decoding="async"
          />
        </a>
      </div>

      <div class="header-nav-center">
        {% include "website/includes/_site_nav.html" %}
      </div>

      <div class="header-end">
        <div class="header-actions">
          <a class="btn btn-header-cta" href="{% url 'website:demo_request' %}">Request Demo</a>
        </div>
        <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="nav-main" aria-label="Open menu" id="nav-toggle">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </div>
</header>
<script>
(function () {
  var btn = document.getElementById("nav-toggle");
  var nav = document.getElementById("nav-main");
  if (btn && nav) {
    btn.addEventListener("click", function () {
      var open = nav.classList.toggle("is-open");
      btn.setAttribute("aria-expanded", open ? "true" : "false");
    });
  }
  var mq = window.matchMedia("(max-width: 1099px)");
  document.addEventListener("click", function (e) {
    if (!mq.matches) return;
    if (!nav || nav.contains(e.target) || (btn && btn.contains(e.target))) return;
    nav.classList.remove("is-open");
    if (btn) btn.setAttribute("aria-expanded", "false");
    nav.querySelectorAll(".nav-item--has-mega.nav-item--open").forEach(function (el) {
      el.classList.remove("nav-item--open");
    });
  });
  function onMqChange() {
    if (!mq.matches && nav) {
      nav.classList.remove("is-open");
      if (btn) btn.setAttribute("aria-expanded", "false");
      nav.querySelectorAll(".nav-item--has-mega.nav-item--open").forEach(function (el) {
        el.classList.remove("nav-item--open");
      });
    }
  }
  if (mq.addEventListener) {
    mq.addEventListener("change", onMqChange);
  } else if (mq.addListener) {
    mq.addListener(onMqChange);
  }
  /* Academy megamenu: first tap opens submenu on small screens; second tap follows link */
  if (nav) {
    nav.querySelectorAll(".nav-item--has-mega > .nav-item__trigger").forEach(function (trigger) {
      trigger.addEventListener("click", function (e) {
        if (!mq.matches) return;
        var item = trigger.closest(".nav-item--has-mega");
        if (!item) return;
        if (!item.classList.contains("nav-item--open")) {
          e.preventDefault();
          nav.querySelectorAll(".nav-item--has-mega.nav-item--open").forEach(function (o) {
            if (o !== item) o.classList.remove("nav-item--open");
          });
          item.classList.add("nav-item--open");
        }
      });
    });
  }
})();
</script>
